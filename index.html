<!DOCTYPE html>
<html lang>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="description" content="This is my first time to try to make a website for myself">
        <meta name="author" content="Hayron竑">
        <script src="./src/router/router.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.1.js"></script>
        <!-- CSS only -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <!-- JavaScript Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
        <title>Hayron竑 的個人網站</title>
    </head>

    <body>
        <header>
            <nav class="navbar navbar-expand-lg bg-light">
                <div class="container-fluid">
                  <a class="navbar-brand" href="#home-page" onclick="changePage('#home-page')">主頁</a>
                  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                  </button>
                  <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                      <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#about-me" onclick="changePage('#about-me')">關於我</a>
                      </li>
                      <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                      </li>
                      <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                          Dropdown
                        </a>
                        <ul class="dropdown-menu">
                          <li><a class="dropdown-item" href="#">Action</a></li>
                          <li><a class="dropdown-item" href="#">Another action</a></li>
                          <li><hr class="dropdown-divider"></li>
                          <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                      </li>
                      <li class="nav-item">
                        <a class="nav-link disabled">Disabled</a>
                      </li>
                    </ul>
                    <form class="d-flex" role="search">
                      <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                      <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                  </div>
                </div>
            </nav>
        </header>

        <div id="home-page" class="page">
            <h1>Hayron竑個人網站</h1>
            <div>
                我是台中科技大學資訊科的大一新生，
                正對網頁設計進行琢磨，但對美術設計沒有興趣。<br>
                目標是了解Website的前端工程、語法、框架、後端工程...等<br>
                正在練習自幹 Html Css JavaScript 三大基礎技術<br>
                預計事成之後 開始學習Vue.js框架並進行改版的動作<br>
            </div>
        </div>

        <div id="about-me" class="page">
            <h1>this is about me</h1>
        </div>
        
    </body>

    <script>
        let Pages = [
            "#home-page",
            "#about-me"
        ]
            
        function changePage(link){
            $(".page").hide();
            if(Pages.includes(link)){
                $(link).show();
            }
            history.pushState(null, null, link);
        }
    </script>
</html>
